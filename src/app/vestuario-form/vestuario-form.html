<div class="pagina">
  <button class="btn-voltar" routerLink="/vestuario">← Voltar</button>
  <h2>Cadastrar Doação</h2>

  <div class="campo">
    <label>Produto</label>
    <input type="text" placeholder="Ex: Camiseta, Bermuda, Moletom..." />
  </div>

  <div class="campo">
    <label>Categoria</label>
    <select>
      <option value="">Selecione...</option>
      <option>Roupa</option>
      <option>Calçado</option>
    </select>
  </div>

  <div class="campo">
    <label>Tipo do Produto</label>
    <input type="text" placeholder="Ex: Oversized, Casual, Alfaiataria..." />
  </div>

  <div class="campo">
    <label>Gênero</label>
    <select>
      <option value="">Selecione...</option>
      <option>Masculino</option>
      <option>Feminino</option>
      <option>Unissex</option>
    </select>
  </div>

  <div class="campo">
    <label>Cor</label>
    <input type="text" placeholder="Ex: Preto, Azul, Vermelho..." />
  </div>

  <div class="campo">
    <label>Tamanho</label>
    <select>
      <option value="">Selecione...</option>
      <option>PP</option>
      <option>P</option>
      <option>M</option>
      <option>G</option>
      <option>GG</option>
    </select>
  </div>

  <div class="campo">
    <label>Tempo de Uso</label>
    <input type="text" placeholder="Ex: 1 Ano" />
  </div>

  <button class="btn-registrar">Registrar Produto</button>
</div>
